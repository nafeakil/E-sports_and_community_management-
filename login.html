<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Games Showcase</title>
  <link rel="stylesheet" href="style2.css">
  <style>
  .login-box {
    backdrop-filter: blur(10px);
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 300px; 
    height: 390px;
    border-radius: 10px;
    box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
    color: rgb(255, 255, 255); 
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 30px; 
    box-sizing: border-box;
  }

  .login-box form {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .login-box input {
    width: 100%;
    padding: 10px;
    margin-top: 12px;
    border: 1px solid #ccc;
    border-radius: 8px;
    box-sizing: border-box;
  }

  .login-box button {
    width: 100%;
    margin-top: 25px;
    border-radius: 8px;
    padding: 10px;
    border: 1px solid #ccc;
    box-shadow: 0 0 20px rgba(0,0,0,0.8);
    cursor: pointer;
    box-sizing: border-box;
  }

  .login-box button:hover { 
    transform: translateY(-3px);
    transition: 0.4s ease;
    background-color: #ff006a; 
  }
  </style>
</head>
<body>

  <video autoplay muted loop class="bg-video">
    <source src="videoplayback (1).mp4" type="video/mp4"> 
  </video>

  <div class="login-box">
    <h3 style="color: white; letter-spacing: 2px; margin-bottom: 20px;">LOGIN</h3>
    <form action="login_check.php" method="POST">
      <input type="text" name="username" placeholder="Username" required autocomplete="off">
      <input type="password" name="password" placeholder="Password" required>
      <button type="submit">submit</button>
    </form>
  </div>

<script>
    const video = document.querySelector('.bg-video');
    window.addEventListener('DOMContentLoaded', () => {
        const savedTime = localStorage.getItem('bgVideoTime');
        if (savedTime) video.currentTime = parseFloat(savedTime);
    });
    window.addEventListener('beforeunload', () => {
        localStorage.setItem('bgVideoTime', video.currentTime);
    });
</script>
</body>
</html>
